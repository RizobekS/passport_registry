{# templates/passports/pdf/blocks/page_parentage_tree_svg.html #}
{% load static pdf_utils %}
<style>
  @page a5land { margin: 4mm 6mm 6mm 6mm; }

  .tree-wrap { margin: 0; }
  .tree-svg  { width: 100%; height: auto; display: block; }

  .node-value {
    font-family: "DejaVuSansPassport",serif;
    font-size: 22px;
    fill: #000;
  }

  .node-name {
    font-family: "DejaVuSansPassport",serif;
    font-size: 22px;
    font-weight: 700;
    fill: #000;
  }
</style>

<div class="tree-wrap">

       viewBox="0 0 3508 2480"
       xmlns="http://www.w3.org/2000/svg"
       preserveAspectRatio="xMidYMid meet">

    <g transform="translate(-210,-149) scale(1.20)">
      <image href="{% static_file 'report/sxemaNasl2_fixed.svg' %}" x="0" y="0" width="3508" height="2480" />

      {# === САМА ЛОШАДЬ === #}
      <g class="node">
        <text class="node-name"  x="820" y="1072">{{ pedigree.self.name }}</text>
        <text class="node-value" x="820" y="1100">{{ pedigree.self.brand }}</text>
        <text class="node-value" x="820" y="1128">{{ pedigree.self.breed }}</text>
      </g>

      {# === РОДИТЕЛИ === #}
      <g class="node">
        <text class="node-name"  x="1458" y="732">{{ pedigree.by_key.DAM.name }}</text>

        <text class="node-value" x="1458" y="788">{{ pedigree.by_key.DAM.breed }}</text>
